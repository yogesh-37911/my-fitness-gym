{% extends 'base.html' %}
{% block title %}Edit Member — {{ settings.gym_name }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Edit Member</h1>
    <p class="page-sub">{{ member.member_id }} — {{ member.full_name }}</p>
  </div>
  <a href="{{ url_for('members.profile', member_id=member.id) }}" class="btn-ghost-main">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<form method="POST" action="{{ url_for('members.edit_member', member_id=member.id) }}" class="member-form">
  <div class="form-grid">
    <div class="form-section">
      <div class="section-header"><i class="bi bi-person-fill"></i><h3>Personal Information</h3></div>
      <div class="field-grid">
        <div class="field-group col-2">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" name="full_name" required class="form-field" value="{{ member.full_name }}">
        </div>
        <div class="field-group">
          <label>Mobile</label>
          <input type="tel" name="mobile" required class="form-field" value="{{ member.mobile }}">
        </div>
        <div class="field-group">
          <label>Emergency Contact</label>
          <input type="tel" name="emergency_contact" class="form-field" value="{{ member.emergency_contact or '' }}">
        </div>
        <div class="field-group">
          <label>Age</label>
          <input type="number" name="age" class="form-field" value="{{ member.age or '' }}">
        </div>
        <div class="field-group">
          <label>Gender</label>
          <select name="gender" class="form-field">
            <option value="">Select</option>
            {% for g in ['Male','Female','Other'] %}
            <option value="{{ g }}" {% if member.gender == g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field-group">
          <label>Date of Birth</label>
          <input type="date" name="date_of_birth" class="form-field" value="{{ member.date_of_birth.isoformat() if member.date_of_birth else '' }}">
        </div>
        <div class="field-group col-2">
          <label>Address</label>
          <textarea name="address" rows="2" class="form-field">{{ member.address or '' }}</textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header"><i class="bi bi-card-checklist"></i><h3>Membership</h3></div>
      <div class="field-grid">
        <div class="field-group">
          <label>Joining Date</label>
          <input type="date" name="joining_date" required class="form-field" value="{{ member.joining_date.isoformat() }}">
        </div>
        <div class="field-group">
          <label>Plan</label>
          <select name="plan_id" class="form-field">
            {% for plan in plans %}
            <option value="{{ plan.id }}" {% if plan.id == member.plan_id %}selected{% endif %}>
              {{ plan.name }} ({{ plan.category.replace('_',' ').title() }}) — ₹{{ plan.price }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header"><i class="bi bi-cash-coin"></i><h3>Payment</h3></div>
      <div class="field-grid">
        <div class="field-group">
          <label>Total Fee</label>
          <input type="number" name="total_fee" step="0.01" class="form-field" value="{{ member.total_fee }}">
        </div>
        <div class="field-group">
          <label>Amount Paid</label>
          <input type="number" name="amount_paid" step="0.01" class="form-field" value="{{ member.amount_paid }}">
        </div>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <a href="{{ url_for('members.profile', member_id=member.id) }}" class="btn-ghost-main">Cancel</a>
    <button type="submit" class="btn-primary-main"><i class="bi bi-check-lg"></i> Save Changes</button>
  </div>
</form>
{% endblock %}
