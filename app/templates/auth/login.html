<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Gym Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-orb login-orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-icon"><i class="bi bi-lightning-charge-fill"></i></div>
        <h1 class="login-title">GymPro</h1>
        <p class="login-sub">Membership Management System</p>
      </div>

      {% if error %}
        <div class="login-error"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
        <label class="login-label">Admin PIN</label>
        <div class="pin-input-wrap">
          <input type="password" name="pin" id="pin-field" class="pin-input"
                 placeholder="Enter your PIN" maxlength="10"
                 inputmode="numeric" autofocus required>
          <button type="button" class="pin-toggle" onclick="togglePin()">
            <i class="bi bi-eye-fill" id="pin-eye"></i>
          </button>
        </div>

        <div class="pin-dots" id="pin-dots">
          <span></span><span></span><span></span><span></span>
        </div>

        <button type="submit" class="login-btn">
          <i class="bi bi-unlock-fill"></i> Login to Dashboard
        </button>
      </form>

      <p class="login-hint">Default PIN: <strong>1234</strong> — Change after first login</p>
    </div>
  </div>

  <script>
    const pinField = document.getElementById('pin-field');
    const dots = document.querySelectorAll('#pin-dots span');

    pinField.addEventListener('input', () => {
      const len = Math.min(pinField.value.length, 4);
      dots.forEach((d, i) => d.classList.toggle('filled', i < len));
    });

    function togglePin() {
      const t = pinField.type === 'password' ? 'text' : 'password';
      pinField.type = t;
      document.getElementById('pin-eye').className = t === 'password' ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
    }
  </script>
</body>
</html>
